<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Bugs Bunny Favicon -->
  <!-- Left Ear -->
  <ellipse cx="22" cy="10" rx="6" ry="14" fill="#D4D4D4" stroke="#999" stroke-width="1"/>
  <ellipse cx="22" cy="10" rx="3.5" ry="11" fill="#FFB6C1"/>
  <!-- Right Ear -->
  <ellipse cx="42" cy="10" rx="6" ry="14" fill="#D4D4D4" stroke="#999" stroke-width="1"/>
  <ellipse cx="42" cy="10" rx="3.5" ry="11" fill="#FFB6C1"/>
  <!-- Head -->
  <ellipse cx="32" cy="38" rx="20" ry="22" fill="#D4D4D4"/>
  <!-- Face/Cheeks -->
  <ellipse cx="32" cy="42" rx="16" ry="15" fill="#F5F5F5"/>
  <!-- Left Eye -->
  <ellipse cx="25" cy="33" rx="5" ry="6" fill="white"/>
  <ellipse cx="26" cy="33" rx="2.5" ry="3.5" fill="#333"/>
  <circle cx="27" cy="31.5" r="1" fill="white"/>
  <!-- Right Eye -->
  <ellipse cx="39" cy="33" rx="5" ry="6" fill="white"/>
  <ellipse cx="38" cy="33" rx="2.5" ry="3.5" fill="#333"/>
  <circle cx="39" cy="31.5" r="1" fill="white"/>
  <!-- Nose -->
  <ellipse cx="32" cy="40" rx="3" ry="2.5" fill="#FFB6C1"/>
  <!-- Mouth -->
  <path d="M26 44 Q32 50 38 44" fill="none" stroke="#666" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Teeth -->
  <rect x="29" y="44" width="3" height="4" rx="0.5" fill="white" stroke="#ccc" stroke-width="0.5"/>
  <rect x="32" y="44" width="3" height="4" rx="0.5" fill="white" stroke="#ccc" stroke-width="0.5"/>
  <!-- Whiskers -->
  <line x1="8" y1="39" x2="20" y2="41" stroke="#999" stroke-width="0.8"/>
  <line x1="8" y1="43" x2="20" y2="43" stroke="#999" stroke-width="0.8"/>
  <line x1="44" y1="41" x2="56" y2="39" stroke="#999" stroke-width="0.8"/>
  <line x1="44" y1="43" x2="56" y2="43" stroke="#999" stroke-width="0.8"/>
</svg>
