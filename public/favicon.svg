<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Bugs Bunny - Looney Tunes Classic Style -->
  <!-- Left Ear -->
  <ellipse cx="22" cy="8" rx="7" ry="16" fill="#C8C8C8"/>
  <ellipse cx="22" cy="8" rx="4" ry="13" fill="#F4A7B9"/>
  <!-- Right Ear -->
  <ellipse cx="42" cy="8" rx="7" ry="16" fill="#C8C8C8"/>
  <ellipse cx="42" cy="8" rx="4" ry="13" fill="#F4A7B9"/>
  <!-- Head shape -->
  <ellipse cx="32" cy="40" rx="22" ry="23" fill="#C8C8C8"/>
  <!-- White face area (cheeks) -->
  <ellipse cx="32" cy="44" rx="18" ry="17" fill="#FFFFFF"/>
  <!-- Left Eye - white -->
  <ellipse cx="24" cy="34" rx="6.5" ry="8" fill="white" stroke="#333" stroke-width="0.8"/>
  <!-- Left Pupil -->
  <ellipse cx="25.5" cy="34" rx="3" ry="4.5" fill="#222"/>
  <circle cx="27" cy="32" r="1.2" fill="white"/>
  <!-- Right Eye - white -->
  <ellipse cx="40" cy="34" rx="6.5" ry="8" fill="white" stroke="#333" stroke-width="0.8"/>
  <!-- Right Pupil -->
  <ellipse cx="38.5" cy="34" rx="3" ry="4.5" fill="#222"/>
  <circle cx="40" cy="32" r="1.2" fill="white"/>
  <!-- Nose -->
  <ellipse cx="32" cy="42" rx="3.5" ry="2.8" fill="#F4A7B9" stroke="#D48A9E" stroke-width="0.5"/>
  <!-- Nose shine -->
  <ellipse cx="31" cy="41" rx="1.2" ry="0.8" fill="#FFCDD9" opacity="0.6"/>
  <!-- Mouth line -->
  <path d="M24 47 Q28 44 32 47 Q36 44 40 47" fill="none" stroke="#555" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Big front teeth -->
  <rect x="28.5" y="47" width="3.2" height="5" rx="1" fill="white" stroke="#bbb" stroke-width="0.6"/>
  <rect x="32.3" y="47" width="3.2" height="5" rx="1" fill="white" stroke="#bbb" stroke-width="0.6"/>
  <!-- Cheek tufts -->
  <ellipse cx="12" cy="42" rx="5" ry="3.5" fill="#C8C8C8"/>
  <ellipse cx="52" cy="42" rx="5" ry="3.5" fill="#C8C8C8"/>
  <!-- Whiskers left -->
  <line x1="6" y1="39" x2="18" y2="42" stroke="#888" stroke-width="0.7" stroke-linecap="round"/>
  <line x1="5" y1="43" x2="18" y2="44" stroke="#888" stroke-width="0.7" stroke-linecap="round"/>
  <line x1="7" y1="47" x2="18" y2="46" stroke="#888" stroke-width="0.7" stroke-linecap="round"/>
  <!-- Whiskers right -->
  <line x1="46" y1="42" x2="58" y2="39" stroke="#888" stroke-width="0.7" stroke-linecap="round"/>
  <line x1="46" y1="44" x2="59" y2="43" stroke="#888" stroke-width="0.7" stroke-linecap="round"/>
  <line x1="46" y1="46" x2="57" y2="47" stroke="#888" stroke-width="0.7" stroke-linecap="round"/>
</svg>
